<div class="admin-wrapper">
  <aside class="sidebar">
    <div class="logo">Etika.Admin</div>
    <nav>
      <button (click)="view='orders'" [class.active]="view==='orders'">📦 Заказы</button>
      <button (click)="view='menu'" [class.active]="view==='menu'">☕ Меню</button>
    </nav>
    <div class="live-stats" *ngIf="stats">
      <p>Сегодня: <b>{{stats.revenue}} ₽</b></p>
      <div class="pulse"></div> Online
    </div>
  </aside>

  <main class="main-content">
    <header>
      <h2>{{ view === 'orders' ? 'Текущие заказы' : 'Управление меню' }}</h2>
    </header>

    <div *ngIf="view === 'orders'" class="grid fade-in">
      <div *ngFor="let o of orders" class="order-tile" [attr.data-status]="o.status">
        <div class="tile-header">
          <span>#{{o.id}}</span>
          <span class="badge">{{o.status}}</span>
        </div>
        <p class="desc">{{o.description}}</p>
        <div class="tile-footer">
          <span class="price">{{o.total_amount}} ₽</span>
          <div class="actions">
            <button *ngIf="o.status==='Новый'" (click)="updateStatus(o.id, 'Готовится')">Принять</button>
            <button *ngIf="o.status==='Готовится'" (click)="updateStatus(o.id, 'Готов')">Готов</button>
            <button *ngIf="o.status==='Готов'" (click)="updateStatus(o.id, 'Выдан')">Выдать</button>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="view === 'menu'" class="menu-editor fade-in">
      <div class="add-form">
        <input [(ngModel)]="newProduct.name" placeholder="Название">
        <input [(ngModel)]="newProduct.price" type="number" placeholder="Цена">
        <button (click)="addProduct()">Добавить товар</button>
      </div>
      <div class="product-list">
        <div *ngFor="let p of products" class="p-item">
          <span>{{p.icon}} {{p.name}} — {{p.price}} ₽</span>
          <button (click)="deleteProduct(p.id)" class="btn-del">Удалить</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="admin-container">
  <header class="admin-header">
    <div class="header-content">
      <h1>Etika | Панель Бариста</h1>
      <div class="stats-container">
        <div class="stat-item">
          <span class="stat-label">Всего заказов:</span>
          <span class="stat-value">{{ orders.length }}</span>
        </div>
        <div class="stat-indicator"><span class="dot"></span> Online</div>
      </div>
    </div>
  </header>

  <main class="content-card">
    <div class="table-responsive">
      <table *ngIf="orders.length > 0; else noOrders">
        <thead>
          <tr>
            <th>ID</th>
            <th>Время</th>
            <th>Описание</th>
            <th>Сумма</th>
            <th>Статус</th>
            <th class="text-right">Действия</th>
          </tr>
        </thead>
        <tbody>
          <div *ngFor="let order of orders; trackBy: trackByOrderId" class="order-card">
  <h3>Заказ №{{order.id}}</h3>
  <p>Состав: {{order.description}}</p>
  <p>Сумма: {{order.total_amount}} ₽</p>
  <p>Статус: <strong>{{order.status}}</strong></p>

  <div class="status-buttons">
    <button (click)="updateStatus(order.id, 'Готовится')" [disabled]="order.status === 'Готовится'">Готовить</button>
    <button (click)="updateStatus(order.id, 'Готов')" [disabled]="order.status === 'Готов'">Готов</button>
    <button (click)="updateStatus(order.id, 'Выдан')" [disabled]="order.status === 'Выдан'">Выдать</button>
  </div>
</div>
            <td class="text-right">
              <button *ngIf="o.status === 'Ожидает принятия'" 
                      (click)="updateStatus(o.id, 'Принят')" 
                      class="btn-action btn-accept">Принять</button>

              <button *ngIf="o.status === 'Принят'" 
                      (click)="updateStatus(o.id, 'Готов')" 
                      class="btn-action btn-ready">Готов</button>

              <button *ngIf="o.status === 'Готов'" 
                      (click)="updateStatus(o.id, 'Выдан')" 
                      class="btn-action btn-deliver">Выдать</button>

              <span *ngIf="o.status === 'Выдан'" class="ready-check">Завершено ✅</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <ng-template #noOrders>
      <div class="empty-state"><h3>Заказов пока нет ☕</h3></div>
    </ng-template>
  </main>
</div>

<div class="admin-container">
  <header class="admin-header">
    <div class="header-content">
      <h1>Etika | Панель Управления</h1>
      <nav class="tab-nav">
        <button (click)="view = 'orders'" [class.active]="view === 'orders'">Заказы</button>
        <button (click)="view = 'menu'" [class.active]="view === 'menu'">Меню</button>
      </nav>
    </div>
  </header>

  <main class="content-card">
    <div *ngIf="view === 'orders'" class="fade-in">
      <table *ngIf="orders.length > 0; else noOrders">
        <thead>
          <tr>
            <th>ID</th>
            <th>Описание</th>
            <th>Сумма</th>
            <th>Статус</th>
            <th class="text-right">Действия</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let o of orders; trackBy: trackByOrderId">
            <td>#{{o.id}}</td>
            <td>{{o.description}}</td>
            <td>{{o.total_amount}} ₽</td>
            <td><span class="status-badge" [attr.data-status]="o.status">{{o.status}}</span></td>
            <td class="text-right">
              <button *ngIf="o.status === 'Новый'" (click)="updateStatus(o.id, 'Готовится')" class="btn-s btn-accept">Принять</button>
              <button *ngIf="o.status === 'Готовится'" (click)="updateStatus(o.id, 'Готов')" class="btn-s btn-ready">Готов</button>
              <button *ngIf="o.status === 'Готов'" (click)="updateStatus(o.id, 'Выдан')" class="btn-s btn-deliver">Выдать</button>
              <span *ngIf="o.status === 'Выдан'">Завершено ✅</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="view === 'menu'" class="fade-in">
      <div class="add-box">
        <input [(ngModel)]="newProduct.name" placeholder="Название">
        <input [(ngModel)]="newProduct.price" type="number" placeholder="Цена">
        <input [(ngModel)]="newProduct.icon" placeholder="☕">
        <button (click)="addProduct()" class="btn-s btn-ready">Добавить</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Иконка</th>
            <th>Название</th>
            <th>Цена</th>
            <th class="text-right">Действие</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of products">
            <td>{{p.icon}}</td>
            <td>{{p.name}}</td>
            <td>{{p.price}} ₽</td>
            <td class="text-right">
              <button (click)="deleteProduct(p.id)" class="btn-delete">Удалить</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <ng-template #noOrders><div class="empty">Заказов нет ☕</div></ng-template>
  </main>
</div>

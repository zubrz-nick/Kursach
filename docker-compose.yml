
services:
  client-app:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./client:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"
  admin-panel:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./admin:/app
    ports:
      - "4200:4200"
    command: sh -c "npm install && npx ng serve --host 0.0.0.0"
  backend-api:
    image: php:8.1-apache
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8080:80"
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
